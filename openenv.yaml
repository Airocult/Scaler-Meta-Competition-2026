---
name: srebench
version: "1.0.0"
description: >
  SREBench simulates on-call incident response for SRE/DevOps agents.
  The agent receives production alerts and must investigate logs, metrics,
  and service dependencies to identify root cause, apply fixes, verify
  resolution, and write a postmortem.
tags: [openenv, sre, devops, incident-response, aiops]
tasks:
  - id: task1_memory_leak
    name: Memory Leak OOM Kill
    difficulty: easy
    max_steps: 20
    description: >
      A single service is OOM-killing repeatedly. Logs are clear.
      Agent must identify the correct service and apply a restart.
  - id: task2_db_cascade
    name: Cascading DB Pool Exhaustion
    difficulty: medium
    max_steps: 30
    description: >
      Service A is returning 503s because Service B (upstream) has
      exhausted its DB connection pool. Agent must trace the dependency
      chain, identify root cause, and drain/scale the pool.
  - id: task3_race_condition
    name: Distributed Race Condition via Config Change
    difficulty: hard
    max_steps: 40
    description: >
      An intermittent 5xx spike began 12 minutes after a config change.
      The agent must correlate the deploy timeline, diff the config,
      identify the cache race condition, roll back, and verify resolution.
  - id: task4_dns_failure
    name: DNS Resolution Failure
    difficulty: easy-medium
    max_steps: 25
    description: >
      auth-service cannot resolve user-db DNS name due to stale DNS cache.
      Auth requests fail intermittently. Agent must identify the DNS
      resolution failure, flush the stale cache, and verify auth recovery.
  - id: task5_cert_expiry
    name: TLS Certificate Expiry Chain
    difficulty: medium-hard
    max_steps: 35
    description: >
      payment-service TLS certificate expired, causing SSL handshake
      failures for both incoming (from order-service) and outgoing
      (mTLS to payment-db) connections. Agent must trace the cert chain,
      renew the certificate, and verify full payment path recovery.
  - id: task6_network_partition
    name: Split-Brain Network Partition
    difficulty: hard
    max_steps: 40
    description: >
      A misconfigured iptables deploy created a network partition between
      inventory-service and inventory-db. inventory-service serves stale
      cached data causing overselling. Agent must identify the partition,
      rollback the network change, reconcile stale data, and verify
      consistency.
  - id: task7_kafka_lag
    name: Kafka Consumer Lag Storm
    difficulty: medium
    max_steps: 25
    description: >
      order-service Kafka consumer is in a rebalance loop after a deploy
      changed session.timeout.ms from 30s to 3s. Consumer lag growing,
      order processing delayed 40s+. Agent must identify the config change,
      rollback the deploy, and verify consumer catches up.
  - id: task8_redis_failover
    name: Redis Sentinel Failover Failure
    difficulty: medium-hard
    max_steps: 30
    description: >
      inventory-service Redis primary node failed but Sentinel cannot
      promote a replica (quorum=3, only 2 sentinels alive). Cache miss
      storm overwhelms inventory-db. Agent must diagnose sentinel config,
      fix quorum or force failover, and verify cache recovery.
  - id: task9_disk_full
    name: Database Disk Space Exhaustion
    difficulty: medium
    max_steps: 25
    description: >
      user-db disk is 100% full from WAL log accumulation after archival
      cron was disabled. auth-service login queries fail. Agent must trace
      auth failures to disk issue, clean WAL, re-enable rotation, and
      verify auth recovery.
  - id: task10_rate_limit
    name: Rate Limiter Misconfiguration
    difficulty: medium
    max_steps: 25
    description: >
      api-gateway rate limiter set to 100 req/s instead of 10000 req/s
      (typo in deploy). 90% of legitimate traffic throttled with 429.
      Agent must identify the deploy, rollback the config, and verify
      traffic flow.
  - id: task11_db_migration_lock
    name: Database Migration Table Lock
    difficulty: hard
    max_steps: 35
    description: >
      DBA ran ALTER TABLE on payment_transactions during peak hours
      without lock_timeout. Exclusive lock blocks all writes for 12+
      minutes. Agent must identify the blocking query, kill the migration,
      and verify payment recovery.
  - id: task12_health_flap
    name: Load Balancer Health Check Flapping
    difficulty: medium-hard
    max_steps: 30
    description: >
      order-service instances flap in/out of load balancer because the
      deep health check calls a slow inventory-service (GC pauses).
      Agent must identify the deep check dependency, switch to shallow
      health check, and verify stability.
  - id: task13_pod_eviction
    name: Kubernetes Pod Eviction Storm
    difficulty: hard
    max_steps: 35
    description: >
      Noisy neighbor batch job (DaemonSet without resource limits)
      consumes all node memory, causing Kubernetes to evict payment-service
      pods. Agent must identify the batch job, remove/limit it, and
      verify payment pods reschedule.
  - id: task14_cascading_timeout
    name: Cascading Timeout Chain
    difficulty: medium-hard
    max_steps: 30
    description: >
      inventory-service has a missing index causing 25s queries. Timeout
      hierarchy mismatch (api-gateway 10s < order-service 30s) causes
      504 errors despite eventual completion. Agent must identify missing
      index, recreate it, and verify latency recovery.
  - id: task15_secret_rotation
    name: Secret Rotation Failure
    difficulty: medium
    max_steps: 25
    description: >
      payment-service API key rotated in Vault but service not restarted
      to pick up new key. All payments fail with 401 from external
      gateway. Agent must identify stale key, restart/reload service,
      and verify payment processing.
  - id: task16_log_storm
    name: Debug Log Storm Pipeline Saturation
    difficulty: hard
    max_steps: 35
    description: >
      Deploy to auth-service set LOG_LEVEL=DEBUG (meant for staging).
      50GB/hr of debug logs saturate shared logging pipeline. auth-service
      CPU at 95% from serialization. Agent must identify the deploy,
      rollback log level, and verify pipeline recovery.
action_space:
  type: object
  fields:
    - name: action_type
      type: string
      enum: [read_logs, check_metrics, list_services, check_alerts,
             check_deployments, check_dependencies, run_diagnostic,
             apply_fix, verify_health, write_postmortem, escalate,
             trace_request, check_slo, classify_severity, update_status_page]
    - name: parameters
      type: object
      description: Action-specific parameters (service name, time range, fix type, etc.)
    - name: reasoning
      type: string
      description: Agent's chain-of-thought before acting (required, min 10 chars)
observation_space:
  type: object
  fields:
    - name: timestamp
      type: string
    - name: alert_summary
      type: string
    - name: service_statuses
      type: object
    - name: last_action_result
      type: string
    - name: incident_phase
      type: string
      enum: [investigating, mitigating, verifying, resolved]
    - name: available_actions
      type: array
    - name: step_count
      type: integer
    - name: time_elapsed_minutes
      type: integer
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  schema: GET /schema
  metadata: GET /metadata
  health: GET /health
  websocket: WS /ws
  tasks: GET /tasks
  grader: GET /grader
  baseline: POST /baseline
baseline_scores:
  task1_memory_leak: 0.960
  task2_db_cascade: 0.934
  task3_race_condition: 0.900
  task4_dns_failure: 0.860
  task5_cert_expiry: 0.964
  task6_network_partition: 0.870
  task7_kafka_lag: 0.880
  task8_redis_failover: 0.850
  task9_disk_full: 0.890
  task10_rate_limit: 0.900
  task11_db_migration_lock: 0.830
  task12_health_flap: 0.860
  task13_pod_eviction: 0.840
  task14_cascading_timeout: 0.850
  task15_secret_rotation: 0.900
  task16_log_storm: 0.830
